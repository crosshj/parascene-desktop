name: macOS desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/macos-desktop.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/macos-desktop.yml"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.2.0
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run desktop:test

      - name: Build desktop (aarch64)
        run: npm run desktop:build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4.6.0
        with:
          name: parascene-macos-aarch64
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      # Rolling prerelease on main — always downloadable from the Releases page
      - name: Publish continuous prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: desktop-latest
          name: Desktop — latest main
          prerelease: true
          make_latest: false
          body: |
            Unsigned Apple Silicon build from `main` (updated on each qualifying push).

            Install: open the DMG → drag to Applications, then:
            ```bash
            xattr -cr /Applications/Parascene.app
            ```
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Versioned release when tagging desktop-v*
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2.2.1
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
